description: >-
  SeatGeek is a live event ticketing and discovery platform that aggregates ticket inventory from multiple sources and
  provides a transparent, data-driven ticket buying experience. The SeatGeek Platform API gives developers access to a
  canonical dataset of live events including concerts, sports, and theater performances, along with performer and venue
  information, seating maps, ticket pricing, and personalized event recommendations. The API uses HTTP Basic Auth or
  query parameter authentication with a client ID and supports RESTful access to events, performers, venues, and
  taxonomies.
