    name: SeatGeek Platform API
    tags:
      - Events
      - Tickets
      - Performers
      - Venues
      - Live Events
    humanURL: https://seatgeek.com/build
    baseURL: https://api.seatgeek.com/2
    properties:
      - url: openapi/seatgeek-platform-openapi.yml
        type: OpenAPI
      - url: https://seatgeek.github.io/
        type: Documentation
      - url: https://seatgeek.com/build
        type: Portal
    description: >-
      The SeatGeek Platform API provides access to SeatGeek's comprehensive dataset of live events in the United States
      and Canada. The API enables developers to search events, performers, and venues, retrieve seat maps, get event
      recommendations, and deep-link users directly to the SeatGeek ticketing purchase flow. It supports JSON, JSONP,
      and XML response formats, with pagination, geolocation filtering, and price-range filtering across all event types
      including sports, concerts, and theater.
