naftiko: 1.0.0-alpha2
info:
  label: SeatGeek Event Discovery
  description: Unified event discovery capability combining SeatGeek's events, performers, venues, and recommendation APIs.
    Enables applications to build comprehensive live event discovery experiences with geolocation search, performer browsing,
    venue exploration, and personalized recommendations for concerts, sports, and theater.
  tags:
  - Events
  - Live Events
  - Concerts
  - Sports
  - Ticketing
  - Discovery
  created: '2026-05-02'
  modified: '2026-05-06'
binds:
- namespace: env
  keys:
    SEATGEEK_CLIENT_ID: SEATGEEK_CLIENT_ID
capability:
  consumes:
  - type: http
    namespace: seatgeek-platform
    baseUri: https://api.seatgeek.com/2
    description: SeatGeek Platform API for live events, performers, and venues
    authentication:
      type: apikey
      key: client_id
      value: '{{SEATGEEK_CLIENT_ID}}'
      placement: query
    resources:
    - name: events
      path: /events
      description: Search and retrieve live events
      operations:
      - name: list-events
        method: GET
        description: List and search events with filtering by performer, venue, date, and location
        inputParameters:
        - name: q
          in: query
          type: string
          required: false
          description: Text search query
        - name: performers
          in: query
          type: string
          required: false
          description: Filter by performer slug
        - name: venue
          in: query
          type: integer
          required: false
          description: Filter by venue ID
        - name: lat
          in: query
          type: number
          required: false
          description: Latitude for geolocation
        - name: lon
          in: query
          type: number
          required: false
          description: Longitude for geolocation
        - name: range
          in: query
          type: string
          required: false
          description: Distance range (e.g., 25mi)
        - name: per_page
          in: query
          type: integer
          required: false
          description: Results per page
        - name: page
          in: query
          type: integer
          required: false
          description: Page number
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: event-detail
      path: /events/{event_id}
      description: Get a specific event
      operations:
      - name: get-event
        method: GET
        description: Get full event details by ID
        inputParameters:
        - name: event_id
          in: path
          type: integer
          required: true
          description: SeatGeek event ID
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: performers
      path: /performers
      description: Search and retrieve performers
      operations:
      - name: list-performers
        method: GET
        description: List and search performers
        inputParameters:
        - name: q
          in: query
          type: string
          required: false
          description: Text search query
        - name: slug
          in: query
          type: string
          required: false
          description: Performer slug
        - name: per_page
          in: query
          type: integer
          required: false
        - name: page
          in: query
          type: integer
          required: false
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: performer-detail
      path: /performers/{performer_id}
      description: Get a specific performer
      operations:
      - name: get-performer
        method: GET
        description: Get full performer details by ID
        inputParameters:
        - name: performer_id
          in: path
          type: integer
          required: true
          description: SeatGeek performer ID
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: venues
      path: /venues
      description: Search and retrieve venues
      operations:
      - name: list-venues
        method: GET
        description: List and search venues by city, state, or geolocation
        inputParameters:
        - name: q
          in: query
          type: string
          required: false
        - name: city
          in: query
          type: string
          required: false
        - name: state
          in: query
          type: string
          required: false
        - name: country
          in: query
          type: string
          required: false
        - name: lat
          in: query
          type: number
          required: false
        - name: lon
          in: query
          type: number
          required: false
        - name: range
          in: query
          type: string
          required: false
        - name: per_page
          in: query
          type: integer
          required: false
        - name: page
          in: query
          type: integer
          required: false
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: taxonomies
      path: /taxonomies
      description: List event taxonomies
      operations:
      - name: list-taxonomies
        method: GET
        description: List available event taxonomy categories
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: recommendations
      path: /recommendations
      description: Get event recommendations
      operations:
      - name: get-recommendations
        method: GET
        description: Get personalized event recommendations based on location and interests
        inputParameters:
        - name: lat
          in: query
          type: number
          required: true
          description: Latitude (required)
        - name: lon
          in: query
          type: number
          required: true
          description: Longitude (required)
        - name: performers.id
          in: query
          type: string
          required: false
          description: Seed performer IDs
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    port: 8080
    namespace: event-discovery-api
    description: Unified REST API for live event discovery with SeatGeek.
    resources:
    - path: /v1/events
      name: events
      description: Search and browse live events
      operations:
      - method: GET
        name: list-events
        description: Search events by keyword, performer, venue, date, or location
        call: seatgeek-platform.list-events
        with:
          q: rest.q
          lat: rest.lat
          lon: rest.lon
          range: rest.range
          per_page: rest.per_page
          page: rest.page
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/events/{event_id}
      name: event-detail
      description: Event details and ticket pricing
      operations:
      - method: GET
        name: get-event
        description: Get full event details with ticket pricing
        call: seatgeek-platform.get-event
        with:
          event_id: rest.event_id
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/performers
      name: performers
      description: Browse performers
      operations:
      - method: GET
        name: list-performers
        description: Search for artists, teams, and performers
        call: seatgeek-platform.list-performers
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/performers/{performer_id}
      name: performer-detail
      description: Performer profile and upcoming events
      operations:
      - method: GET
        name: get-performer
        description: Get performer details
        call: seatgeek-platform.get-performer
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/venues
      name: venues
      description: Search venues
      operations:
      - method: GET
        name: list-venues
        description: Find venues by city, state, or location radius
        call: seatgeek-platform.list-venues
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/taxonomies
      name: taxonomies
      description: Event categories and classifications
      operations:
      - method: GET
        name: list-taxonomies
        description: List all event taxonomy categories
        call: seatgeek-platform.list-taxonomies
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/recommendations
      name: recommendations
      description: Personalized event recommendations
      operations:
      - method: GET
        name: get-recommendations
        description: Get personalized event recommendations
        call: seatgeek-platform.get-recommendations
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    port: 9090
    namespace: event-discovery-mcp
    transport: http
    description: MCP server for AI-assisted live event discovery with SeatGeek.
    tools:
    - name: search-events
      description: Search for live events by artist name, genre, location, date range, or ticket price
      hints:
        readOnly: true
        openWorld: true
      call: seatgeek-platform.list-events
      with:
        q: tools.q
        lat: tools.lat
        lon: tools.lon
        range: tools.range
        per_page: tools.per_page
      outputParameters:
      - type: object
        mapping: $.
    - name: get-event-details
      description: Get full details for a specific event including venue, performers, ticket pricing, and seat availability
      hints:
        readOnly: true
        openWorld: false
      call: seatgeek-platform.get-event
      with:
        event_id: tools.event_id
      outputParameters:
      - type: object
        mapping: $.
    - name: search-performers
      description: Search for concert artists, sports teams, theater companies, and other performers
      hints:
        readOnly: true
        openWorld: true
      call: seatgeek-platform.list-performers
      with:
        q: tools.q
        slug: tools.slug
      outputParameters:
      - type: object
        mapping: $.
    - name: get-performer-details
      description: Get performer profile, genre, and upcoming event count
      hints:
        readOnly: true
        openWorld: false
      call: seatgeek-platform.get-performer
      with:
        performer_id: tools.performer_id
      outputParameters:
      - type: object
        mapping: $.
    - name: search-venues
      description: Find event venues by city, state, country, or location radius
      hints:
        readOnly: true
        openWorld: true
      call: seatgeek-platform.list-venues
      with:
        city: tools.city
        state: tools.state
        lat: tools.lat
        lon: tools.lon
        range: tools.range
      outputParameters:
      - type: object
        mapping: $.
    - name: list-event-categories
      description: List available event taxonomy categories such as concerts, sports, and theater
      hints:
        readOnly: true
        openWorld: false
      call: seatgeek-platform.list-taxonomies
      outputParameters:
      - type: object
        mapping: $.
    - name: get-event-recommendations
      description: Get personalized event recommendations based on user location and interests
      hints:
        readOnly: true
        openWorld: true
      call: seatgeek-platform.get-recommendations
      with:
        lat: tools.lat
        lon: tools.lon
        performers.id: tools.performer_ids
      outputParameters:
      - type: object
        mapping: $.
