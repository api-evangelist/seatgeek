naftiko: "1.0.0-alpha1"

info:
  label: "SeatGeek Platform API"
  description: "Live events discovery API covering events, performers, venues, taxonomies, and recommendations."
  tags:
    - Events
    - Tickets
    - Live Events
    - Performers
    - Venues
  created: "2026-05-02"
  modified: "2026-05-02"

binds:
  - namespace: env
    keys:
      SEATGEEK_CLIENT_ID: SEATGEEK_CLIENT_ID

capability:
  consumes:
    - type: http
      namespace: seatgeek-platform
      baseUri: https://api.seatgeek.com/2
      description: "SeatGeek Platform API for live events, performers, and venues"
      authentication:
        type: apikey
        key: client_id
        value: "{{SEATGEEK_CLIENT_ID}}"
        placement: query
      resources:
        - name: events
          path: /events
          description: "Search and retrieve live events"
          operations:
            - name: list-events
              method: GET
              description: "List and search events with filtering by performer, venue, date, and location"
              inputParameters:
                - name: q
                  in: query
                  type: string
                  required: false
                  description: "Text search query"
                - name: performers
                  in: query
                  type: string
                  required: false
                  description: "Filter by performer slug"
                - name: venue
                  in: query
                  type: integer
                  required: false
                  description: "Filter by venue ID"
                - name: lat
                  in: query
                  type: number
                  required: false
                  description: "Latitude for geolocation"
                - name: lon
                  in: query
                  type: number
                  required: false
                  description: "Longitude for geolocation"
                - name: range
                  in: query
                  type: string
                  required: false
                  description: "Distance range (e.g., 25mi)"
                - name: per_page
                  in: query
                  type: integer
                  required: false
                  description: "Results per page"
                - name: page
                  in: query
                  type: integer
                  required: false
                  description: "Page number"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: event-detail
          path: /events/{event_id}
          description: "Get a specific event"
          operations:
            - name: get-event
              method: GET
              description: "Get full event details by ID"
              inputParameters:
                - name: event_id
                  in: path
                  type: integer
                  required: true
                  description: "SeatGeek event ID"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: performers
          path: /performers
          description: "Search and retrieve performers"
          operations:
            - name: list-performers
              method: GET
              description: "List and search performers"
              inputParameters:
                - name: q
                  in: query
                  type: string
                  required: false
                  description: "Text search query"
                - name: slug
                  in: query
                  type: string
                  required: false
                  description: "Performer slug"
                - name: per_page
                  in: query
                  type: integer
                  required: false
                - name: page
                  in: query
                  type: integer
                  required: false
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: performer-detail
          path: /performers/{performer_id}
          description: "Get a specific performer"
          operations:
            - name: get-performer
              method: GET
              description: "Get full performer details by ID"
              inputParameters:
                - name: performer_id
                  in: path
                  type: integer
                  required: true
                  description: "SeatGeek performer ID"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: venues
          path: /venues
          description: "Search and retrieve venues"
          operations:
            - name: list-venues
              method: GET
              description: "List and search venues by city, state, or geolocation"
              inputParameters:
                - name: q
                  in: query
                  type: string
                  required: false
                - name: city
                  in: query
                  type: string
                  required: false
                - name: state
                  in: query
                  type: string
                  required: false
                - name: country
                  in: query
                  type: string
                  required: false
                - name: lat
                  in: query
                  type: number
                  required: false
                - name: lon
                  in: query
                  type: number
                  required: false
                - name: range
                  in: query
                  type: string
                  required: false
                - name: per_page
                  in: query
                  type: integer
                  required: false
                - name: page
                  in: query
                  type: integer
                  required: false
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: taxonomies
          path: /taxonomies
          description: "List event taxonomies"
          operations:
            - name: list-taxonomies
              method: GET
              description: "List available event taxonomy categories"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: recommendations
          path: /recommendations
          description: "Get event recommendations"
          operations:
            - name: get-recommendations
              method: GET
              description: "Get personalized event recommendations based on location and interests"
              inputParameters:
                - name: lat
                  in: query
                  type: number
                  required: true
                  description: "Latitude (required)"
                - name: lon
                  in: query
                  type: number
                  required: true
                  description: "Longitude (required)"
                - name: performers.id
                  in: query
                  type: string
                  required: false
                  description: "Seed performer IDs"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      port: 8100
      namespace: seatgeek-rest
      resources:
        - path: /v1/events
          name: events
          description: "Search events"
          operations:
            - method: GET
              name: list-events
              description: "Search and filter live events"
              call: "seatgeek-platform.list-events"
              outputParameters:
                - type: object
                  mapping: "$."

        - path: /v1/events/{event_id}
          name: event-detail
          description: "Get event details"
          operations:
            - method: GET
              name: get-event
              description: "Get event by ID"
              call: "seatgeek-platform.get-event"
              outputParameters:
                - type: object
                  mapping: "$."

        - path: /v1/performers
          name: performers
          description: "Search performers"
          operations:
            - method: GET
              name: list-performers
              description: "Search performers"
              call: "seatgeek-platform.list-performers"
              outputParameters:
                - type: object
                  mapping: "$."

        - path: /v1/venues
          name: venues
          description: "Search venues"
          operations:
            - method: GET
              name: list-venues
              description: "Search venues"
              call: "seatgeek-platform.list-venues"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9100
      namespace: seatgeek-mcp
      transport: http
      tools:
        - name: list-events
          description: "Search live events by artist, venue, location, or date"
          hints:
            readOnly: true
            openWorld: true
          call: "seatgeek-platform.list-events"
          outputParameters:
            - type: object
              mapping: "$."

        - name: get-event
          description: "Get full details for a specific event including tickets and pricing"
          hints:
            readOnly: true
            openWorld: false
          call: "seatgeek-platform.get-event"
          outputParameters:
            - type: object
              mapping: "$."

        - name: list-performers
          description: "Search for performers including artists, sports teams, and theater companies"
          hints:
            readOnly: true
            openWorld: true
          call: "seatgeek-platform.list-performers"
          outputParameters:
            - type: object
              mapping: "$."

        - name: get-performer
          description: "Get performer details and upcoming events"
          hints:
            readOnly: true
            openWorld: false
          call: "seatgeek-platform.get-performer"
          outputParameters:
            - type: object
              mapping: "$."

        - name: list-venues
          description: "Search venues by city, state, or geolocation radius"
          hints:
            readOnly: true
            openWorld: true
          call: "seatgeek-platform.list-venues"
          outputParameters:
            - type: object
              mapping: "$."

        - name: list-taxonomies
          description: "List available event taxonomy categories (concerts, sports, theater)"
          hints:
            readOnly: true
            openWorld: false
          call: "seatgeek-platform.list-taxonomies"
          outputParameters:
            - type: object
              mapping: "$."

        - name: get-recommendations
          description: "Get personalized event recommendations based on location and performer interests"
          hints:
            readOnly: true
            openWorld: true
          call: "seatgeek-platform.get-recommendations"
          outputParameters:
            - type: object
              mapping: "$."
